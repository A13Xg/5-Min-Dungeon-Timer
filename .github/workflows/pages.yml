name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Validate FX library availability
        run: |
          set -euo pipefail
          curl -fsSLI "https://cdn.jsdelivr.net/npm/@tsparticles/engine@3/+esm" >/dev/null || curl -fsSLI "https://unpkg.com/@tsparticles/engine@3/+esm" >/dev/null
          curl -fsSLI "https://cdn.jsdelivr.net/npm/@tsparticles/preset-fire@3/+esm" >/dev/null || curl -fsSLI "https://unpkg.com/@tsparticles/preset-fire@3/+esm" >/dev/null
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
